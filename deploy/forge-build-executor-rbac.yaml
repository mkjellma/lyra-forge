apiVersion: v1
kind: Namespace
metadata:
  name: forge-build
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forge-build-job
  namespace: forge-build
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: forge-build-executor
  namespace: forge-build
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: forge-build-executor
  namespace: forge-build
subjects:
  - kind: ServiceAccount
    name: forge-build-executor
    namespace: forge-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: forge-build-executor

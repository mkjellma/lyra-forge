# This is deliberately a narrow guard for the sole v0 credentialed Job.
# It applies only to the executor's identity. Owners remain able to administer
# their k3s cluster outside Forge.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: forge-adesco-build-template
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["batch"]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["jobs"]
        scope: "Namespaced"
  validations:
    - expression: >-
        request.userInfo.username != 'system:serviceaccount:forge-system:forge-build-executor' ||
        (request.namespace == 'forge-build' &&
        object.metadata.name.matches('^forge-build-adesco-[a-f0-9]{12}$') &&
        object.metadata.labels.size() == 2 &&
        object.metadata.labels['forge.lyra/project'] == 'adesco-webb' &&
        object.metadata.labels['forge.lyra/commit'].matches('^[a-f0-9]{40}$') &&
        object.metadata.name == 'forge-build-adesco-' + object.metadata.labels['forge.lyra/commit'].substring(0, 12) &&
        object.spec.template.metadata.labels == object.metadata.labels)
      message: Forge executor may create only deterministically named Adesco jobs.
    - expression: >-
        request.userInfo.username != 'system:serviceaccount:forge-system:forge-build-executor' ||
        (object.spec.backoffLimit == 0 && object.spec.completions == 1 &&
        object.spec.parallelism == 1 && object.spec.activeDeadlineSeconds == 900 &&
        object.spec.ttlSecondsAfterFinished == 3600 &&
        object.spec.template.spec.serviceAccountName == 'forge-build-job' &&
        object.spec.template.spec.automountServiceAccountToken == false &&
        object.spec.template.spec.enableServiceLinks == false &&
        object.spec.template.spec.restartPolicy == 'Never' &&
        object.spec.template.spec.hostNetwork == false &&
        object.spec.template.spec.hostPID == false &&
        object.spec.template.spec.hostIPC == false &&
        object.spec.template.spec.initContainers.size() == 1 &&
        object.spec.template.spec.containers.size() == 1 &&
        !has(object.spec.template.spec.ephemeralContainers))
      message: Forge executor may create only the fixed isolated build pod shape.
    - expression: >-
        request.userInfo.username != 'system:serviceaccount:forge-system:forge-build-executor' ||
        (object.spec.template.spec.initContainers[0].name == 'checkout' &&
        object.spec.template.spec.initContainers[0].image == 'docker.io/alpine/git@sha256:5e1543841d987081a1e0e37305039b2bb9908592a4cddad95b4c4c49d07653a3' &&
        object.spec.template.spec.initContainers[0].imagePullPolicy == 'Never' &&
        object.spec.template.spec.initContainers[0].command == ['/bin/sh', '-ec'] &&
        object.spec.template.spec.initContainers[0].args == ['set -eu\ninstall -m 600 /var/run/forge-git-key/id_ed25519 /var/run/forge-git/id_ed25519\ngit init /workspace\ngit -C /workspace remote add origin "$FORGE_CHECKOUT_REPOSITORY"\ngit -C /workspace fetch --no-tags origin "$FORGE_BRANCH"\ngit -C /workspace update-ref refs/forge/allowed FETCH_HEAD\ngit -C /workspace fetch --no-tags origin "$FORGE_COMMIT_SHA"\ngit -C /workspace cat-file -e "$FORGE_COMMIT_SHA^{commit}"\ngit -C /workspace merge-base --is-ancestor "$FORGE_COMMIT_SHA" refs/forge/allowed\ngit -C /workspace checkout --detach "$FORGE_COMMIT_SHA"'] &&
        object.spec.template.spec.containers[0].name == 'build' &&
        object.spec.template.spec.containers[0].image == 'docker.io/library/node@sha256:4ba75f835bb8802193e4c114572113d4b26f95f6f094f4b5229d2a77773e0afc' &&
        object.spec.template.spec.containers[0].imagePullPolicy == 'Never' &&
        object.spec.template.spec.containers[0].command == ['/bin/sh', '-ec'] &&
        object.spec.template.spec.containers[0].args == ['set -eu\nnpm ci\nnpm run build'] &&
        object.spec.template.spec.containers[0].workingDir == '/workspace' &&
        !has(object.spec.template.spec.initContainers[0].lifecycle) &&
        !has(object.spec.template.spec.initContainers[0].livenessProbe) &&
        !has(object.spec.template.spec.initContainers[0].readinessProbe) &&
        !has(object.spec.template.spec.initContainers[0].startupProbe) &&
        !has(object.spec.template.spec.initContainers[0].terminationMessagePath) &&
        !has(object.spec.template.spec.initContainers[0].terminationMessagePolicy) &&
        !has(object.spec.template.spec.initContainers[0].volumeDevices) &&
        !has(object.spec.template.spec.containers[0].lifecycle) &&
        !has(object.spec.template.spec.containers[0].livenessProbe) &&
        !has(object.spec.template.spec.containers[0].readinessProbe) &&
        !has(object.spec.template.spec.containers[0].startupProbe) &&
        !has(object.spec.template.spec.containers[0].terminationMessagePath) &&
        !has(object.spec.template.spec.containers[0].terminationMessagePolicy) &&
        !has(object.spec.template.spec.containers[0].volumeDevices))
      message: Forge executor may use only the fixed checkout and builder images and commands.
    - expression: >-
        request.userInfo.username != 'system:serviceaccount:forge-system:forge-build-executor' ||
        (object.spec.template.spec.initContainers[0].env.size() == 9 &&
        object.spec.template.spec.initContainers[0].env[0].name == 'FORGE_CHECKOUT_REPOSITORY' && object.spec.template.spec.initContainers[0].env[0].value == 'git@github.com:mkjellma/adesco.git' &&
        object.spec.template.spec.initContainers[0].env[1].name == 'FORGE_BRANCH' && object.spec.template.spec.initContainers[0].env[1].value == 'main' &&
        object.spec.template.spec.initContainers[0].env[2].name == 'FORGE_COMMIT_SHA' && object.spec.template.spec.initContainers[0].env[2].valueFrom.fieldRef.fieldPath == "metadata.labels['forge.lyra/commit']" &&
        object.spec.template.spec.initContainers[0].env[3].name == 'GIT_TERMINAL_PROMPT' && object.spec.template.spec.initContainers[0].env[3].value == '0' &&
        object.spec.template.spec.initContainers[0].env[4].name == 'GIT_CONFIG_NOSYSTEM' && object.spec.template.spec.initContainers[0].env[4].value == '1' &&
        object.spec.template.spec.initContainers[0].env[5].name == 'GIT_SSH_COMMAND' && object.spec.template.spec.initContainers[0].env[5].value == 'ssh -F /dev/null -i /var/run/forge-git/id_ed25519 -o BatchMode=yes -o IdentitiesOnly=yes -o PasswordAuthentication=no -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/var/run/forge-git-known-hosts/known_hosts -o GlobalKnownHostsFile=/dev/null' &&
        object.spec.template.spec.initContainers[0].env[6].name == 'GIT_CONFIG_COUNT' && object.spec.template.spec.initContainers[0].env[6].value == '1' &&
        object.spec.template.spec.initContainers[0].env[7].name == 'GIT_CONFIG_KEY_0' && object.spec.template.spec.initContainers[0].env[7].value == 'safe.directory' &&
        object.spec.template.spec.initContainers[0].env[8].name == 'GIT_CONFIG_VALUE_0' && object.spec.template.spec.initContainers[0].env[8].value == '/workspace' &&
        object.spec.template.spec.containers[0].env.size() == 3 &&
        object.spec.template.spec.containers[0].env[0].name == 'HOME' && object.spec.template.spec.containers[0].env[0].value == '/home/forge' &&
        object.spec.template.spec.containers[0].env[1].name == 'NPM_CONFIG_CACHE' && object.spec.template.spec.containers[0].env[1].value == '/workspace/.npm-cache' &&
        object.spec.template.spec.containers[0].env[2].name == 'TMPDIR' && object.spec.template.spec.containers[0].env[2].value == '/tmp' &&
        !has(object.spec.template.spec.initContainers[0].envFrom) && !has(object.spec.template.spec.containers[0].envFrom))
      message: Forge executor may not inject credentials or free environment data.
    - expression: >-
        request.userInfo.username != 'system:serviceaccount:forge-system:forge-build-executor' ||
        (object.spec.template.spec.securityContext.fsGroup == 10001 &&
        object.spec.template.spec.securityContext.seccompProfile.type == 'RuntimeDefault' &&
        object.spec.template.spec.initContainers[0].securityContext.allowPrivilegeEscalation == false &&
        object.spec.template.spec.initContainers[0].securityContext.readOnlyRootFilesystem == true &&
        object.spec.template.spec.initContainers[0].securityContext.runAsNonRoot == true &&
        object.spec.template.spec.initContainers[0].securityContext.runAsUser == 10001 &&
        object.spec.template.spec.initContainers[0].securityContext.runAsGroup == 10001 &&
        object.spec.template.spec.initContainers[0].securityContext.capabilities.drop == ['ALL'] &&
        object.spec.template.spec.initContainers[0].securityContext.seccompProfile.type == 'RuntimeDefault' &&
        !has(object.spec.template.spec.initContainers[0].securityContext.privileged) &&
        object.spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation == false &&
        object.spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem == true &&
        object.spec.template.spec.containers[0].securityContext.runAsNonRoot == true &&
        object.spec.template.spec.containers[0].securityContext.runAsUser == 10001 &&
        object.spec.template.spec.containers[0].securityContext.runAsGroup == 10001 &&
        object.spec.template.spec.containers[0].securityContext.capabilities.drop == ['ALL'] &&
        object.spec.template.spec.containers[0].securityContext.seccompProfile.type == 'RuntimeDefault' &&
        !has(object.spec.template.spec.containers[0].securityContext.privileged) &&
        object.spec.template.spec.initContainers[0].resources.requests['cpu'] == '250m' && object.spec.template.spec.initContainers[0].resources.requests['memory'] == '512Mi' && object.spec.template.spec.initContainers[0].resources.requests['ephemeral-storage'] == '1Gi' &&
        object.spec.template.spec.initContainers[0].resources.limits['cpu'] == '1' && object.spec.template.spec.initContainers[0].resources.limits['memory'] == '1536Mi' && object.spec.template.spec.initContainers[0].resources.limits['ephemeral-storage'] == '2Gi' &&
        object.spec.template.spec.containers[0].resources.requests['cpu'] == '250m' && object.spec.template.spec.containers[0].resources.requests['memory'] == '512Mi' && object.spec.template.spec.containers[0].resources.requests['ephemeral-storage'] == '1Gi' &&
        object.spec.template.spec.containers[0].resources.limits['cpu'] == '1' && object.spec.template.spec.containers[0].resources.limits['memory'] == '1536Mi' && object.spec.template.spec.containers[0].resources.limits['ephemeral-storage'] == '2Gi')
      message: Forge executor may not change the build pod security or resource limits.
    - expression: >-
        request.userInfo.username != 'system:serviceaccount:forge-system:forge-build-executor' ||
        (object.spec.template.spec.volumes.size() == 6 &&
        object.spec.template.spec.volumes[0].name == 'workspace' && object.spec.template.spec.volumes[0].emptyDir.sizeLimit == '2Gi' &&
        object.spec.template.spec.volumes[1].name == 'runtime-tmp' && object.spec.template.spec.volumes[1].emptyDir.sizeLimit == '256Mi' &&
        object.spec.template.spec.volumes[2].name == 'runtime-home' && object.spec.template.spec.volumes[2].emptyDir.sizeLimit == '256Mi' &&
        object.spec.template.spec.volumes[3].name == 'checkout-ssh' && object.spec.template.spec.volumes[3].emptyDir.sizeLimit == '1Mi' &&
        object.spec.template.spec.volumes[4].name == 'github-deploy-key' && object.spec.template.spec.volumes[4].secret.secretName == 'adesco-github-deploy-key' && object.spec.template.spec.volumes[4].secret.defaultMode == 288 && object.spec.template.spec.volumes[4].secret.items.size() == 1 && object.spec.template.spec.volumes[4].secret.items[0].key == 'id_ed25519' && object.spec.template.spec.volumes[4].secret.items[0].path == 'id_ed25519' &&
        object.spec.template.spec.volumes[5].name == 'github-known-hosts' && object.spec.template.spec.volumes[5].configMap.name == 'github-com-known-hosts' && object.spec.template.spec.volumes[5].configMap.defaultMode == 292 && object.spec.template.spec.volumes[5].configMap.items.size() == 1 && object.spec.template.spec.volumes[5].configMap.items[0].key == 'known_hosts' && object.spec.template.spec.volumes[5].configMap.items[0].path == 'known_hosts')
      message: Forge executor may mount only the fixed Adesco deploy key and GitHub host key.
    - expression: >-
        request.userInfo.username != 'system:serviceaccount:forge-system:forge-build-executor' ||
        (object.spec.template.spec.initContainers[0].volumeMounts.size() == 6 &&
        object.spec.template.spec.initContainers[0].volumeMounts[0].name == 'workspace' && object.spec.template.spec.initContainers[0].volumeMounts[0].mountPath == '/workspace' &&
        object.spec.template.spec.initContainers[0].volumeMounts[1].name == 'runtime-tmp' && object.spec.template.spec.initContainers[0].volumeMounts[1].mountPath == '/tmp' &&
        object.spec.template.spec.initContainers[0].volumeMounts[2].name == 'runtime-home' && object.spec.template.spec.initContainers[0].volumeMounts[2].mountPath == '/home/forge' &&
        object.spec.template.spec.initContainers[0].volumeMounts[3].name == 'github-deploy-key' && object.spec.template.spec.initContainers[0].volumeMounts[3].mountPath == '/var/run/forge-git-key' && object.spec.template.spec.initContainers[0].volumeMounts[3].readOnly == true &&
        object.spec.template.spec.initContainers[0].volumeMounts[4].name == 'github-known-hosts' && object.spec.template.spec.initContainers[0].volumeMounts[4].mountPath == '/var/run/forge-git-known-hosts' && object.spec.template.spec.initContainers[0].volumeMounts[4].readOnly == true &&
        object.spec.template.spec.initContainers[0].volumeMounts[5].name == 'checkout-ssh' && object.spec.template.spec.initContainers[0].volumeMounts[5].mountPath == '/var/run/forge-git' &&
        object.spec.template.spec.containers[0].volumeMounts.size() == 3 &&
        object.spec.template.spec.containers[0].volumeMounts[0].name == 'workspace' && object.spec.template.spec.containers[0].volumeMounts[0].mountPath == '/workspace' &&
        object.spec.template.spec.containers[0].volumeMounts[1].name == 'runtime-tmp' && object.spec.template.spec.containers[0].volumeMounts[1].mountPath == '/tmp' &&
        object.spec.template.spec.containers[0].volumeMounts[2].name == 'runtime-home' && object.spec.template.spec.containers[0].volumeMounts[2].mountPath == '/home/forge')
      message: The build container may not mount the deploy key or SSH working volume.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: forge-adesco-build-template
spec:
  policyName: forge-adesco-build-template
  validationActions: [Deny]
  matchResources:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: forge-build

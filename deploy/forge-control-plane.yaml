apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forge-state
  namespace: forge-system
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-control-plane
  namespace: forge-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forge-control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forge-control-plane
    spec:
      serviceAccountName: forge-control
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: forge
          image: lyra-forge:0.1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: FORGE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forge-api-token
                  key: token
            - name: FORGE_STATE_PATH
              value: /app/data/forge-state.json
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
          volumeMounts:
            - name: state
              mountPath: /app/data
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: forge-state

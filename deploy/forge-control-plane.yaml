apiVersion: v1
kind: ServiceAccount
metadata:
  name: forge-build-executor
  namespace: forge-system
automountServiceAccountToken: false
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forge-state
  namespace: forge-system
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-control-plane
  namespace: forge-system
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: forge-control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forge-control-plane
    spec:
      serviceAccountName: forge-build-executor
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: forge
          image: lyra-forge:0.1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: FORGE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forge-api-token
                  key: api-token
            - name: FORGE_STATE_PATH
              value: /var/lib/forge/forge-state.json
            - name: FORGE_BUILD_EXECUTOR_SOCKET
              value: /var/run/forge-executor/executor.sock
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
          volumeMounts:
            - name: state
              mountPath: /var/lib/forge
            - name: executor-socket
              mountPath: /var/run/forge-executor
        - name: build-executor
          image: lyra-forge:0.1.0
          imagePullPolicy: Never
          command: ["node", "src/build-executor-main.js"]
          env:
            - name: FORGE_BUILD_EXECUTOR_SOCKET
              value: /var/run/forge-executor/executor.sock
            - name: FORGE_CHECKOUT_IMAGE
              value: docker.io/alpine/git@sha256:5e1543841d987081a1e0e37305039b2bb9908592a4cddad95b4c4c49d07653a3
            - name: FORGE_BUILDER_IMAGE
              value: docker.io/library/node@sha256:4ba75f835bb8802193e4c114572113d4b26f95f6f094f4b5229d2a77773e0afc
            - name: FORGE_BUILD_PROJECTS_PATH
              value: /etc/forge-build-projects/build-projects.json
            - name: NODE_EXTRA_CA_CERTS
              value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: executor-socket
              mountPath: /var/run/forge-executor
            - name: build-projects
              mountPath: /etc/forge-build-projects
              readOnly: true
            - name: executor-token
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: forge-state
        - name: executor-socket
          emptyDir: {}
        - name: executor-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3600
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
        - name: build-projects
          configMap:
            name: forge-build-projects
            items:
              - key: build-projects.json
                path: build-projects.json
---
apiVersion: v1
kind: Service
metadata:
  name: forge-api-private
  namespace: forge-system
spec:
  type: NodePort
  externalTrafficPolicy: Local
  ipFamilyPolicy: SingleStack
  ipFamilies: [IPv4]
  sessionAffinity: None
  selector:
    app.kubernetes.io/name: forge-control-plane
  ports:
    - name: http-api
      protocol: TCP
      port: 3000
      targetPort: http
      nodePort: 30080

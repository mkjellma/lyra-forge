apiVersion: v1
kind: ServiceAccount
metadata:
  name: forge-api
  namespace: forge-system
automountServiceAccountToken: false
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forge-state
  namespace: forge-system
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-control-plane
  namespace: forge-system
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: forge-control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forge-control-plane
    spec:
      serviceAccountName: forge-api
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: forge
          image: lyra-forge:0.1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: FORGE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forge-api-token
                  key: api-token
            - name: FORGE_STATE_PATH
              value: /var/lib/forge/forge-state.json
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
          volumeMounts:
            - name: state
              mountPath: /var/lib/forge
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: forge-state
---
apiVersion: v1
kind: Service
metadata:
  name: forge-api-private
  namespace: forge-system
spec:
  type: NodePort
  externalTrafficPolicy: Local
  ipFamilyPolicy: SingleStack
  ipFamilies: [IPv4]
  sessionAffinity: None
  selector:
    app.kubernetes.io/name: forge-control-plane
  ports:
    - name: http-api
      protocol: TCP
      port: 3000
      targetPort: http
      nodePort: 30080

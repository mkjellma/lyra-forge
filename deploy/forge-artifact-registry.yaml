apiVersion: v1
kind: Namespace
metadata:
  name: forge-artifacts
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forge-registry-data
  namespace: forge-artifacts
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-registry
  namespace: forge-artifacts
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: forge-registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forge-registry
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      containers:
        - name: registry
          image: docker.io/library/registry@sha256:46faa9a1ae6813194b53921a370f2f4f8c5e1aae228a89bceafef5847a6a3278
          imagePullPolicy: Never
          ports:
            - name: registry
              containerPort: 5000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: registry-data
              mountPath: /var/lib/registry
      volumes:
        - name: registry-data
          persistentVolumeClaim:
            claimName: forge-registry-data
---
apiVersion: v1
kind: Service
metadata:
  name: forge-registry
  namespace: forge-artifacts
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: forge-registry
  ports:
    - name: registry
      port: 5000
      targetPort: registry
